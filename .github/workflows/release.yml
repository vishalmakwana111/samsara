name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      # Build the binary for the target, package it as
      # samsara-<target>.tar.gz (+ .sha256), and upload it to the release
      # for this tag. Handles cross-compilation (e.g. aarch64 linux) via `cross`.
      - name: Build & upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: samsara
          target: ${{ matrix.target }}
          archive: samsara-$target
          tar: unix
          checksum: sha256
          include: README.md,LICENSE
          token: ${{ secrets.GITHUB_TOKEN }}
